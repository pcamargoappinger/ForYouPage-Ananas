<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klassen-Feed</title>
</head>
<body>

<h2>Drag & Drop GitHub Upload Demo integriert</h2>

<div id="dropZone" style="
border:2px dashed #ccc;
padding:20px;
text-align:center;
cursor:pointer;">
Bild hier hineinziehen oder klicken
<input type="file" id="fileInput" style="display:none;">
</div>

<img id="imgPreview" style="max-width:300px; display:none; margin-top:10px;">

<script>
const GITHUB = {
  token: "DEIN_GITHUB_TOKEN",
  repo: "USERNAME/REPO",
  branch: "main",
  path: "uploads"
};

async function uploadToGitHub(file) {
  const reader = new FileReader();

  return new Promise((resolve, reject) => {
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      const fileName = Date.now() + "_" + file.name;

      const url = `https://api.github.com/repos/${GITHUB.repo}/contents/${GITHUB.path}/${fileName}`;

      try {
        const res = await fetch(url, {
          method: "PUT",
          headers: {
            "Authorization": `token ${GITHUB.token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: "Upload image",
            content: base64,
            branch: GITHUB.branch
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        const rawUrl = `https://raw.githubusercontent.com/${GITHUB.repo}/${GITHUB.branch}/${GITHUB.path}/${fileName}`;
        resolve(rawUrl);
      } catch (err) {
        reject(err);
      }
    };

    reader.readAsDataURL(file);
  });
}

function setupDragDrop() {
  const dropZone = document.getElementById("dropZone");
  const fileInput = document.getElementById("fileInput");
  const preview = document.getElementById("imgPreview");

  dropZone.onclick = () => fileInput.click();

  fileInput.onchange = e => handleFile(e.target.files[0]);

  dropZone.ondragover = e => {
    e.preventDefault();
    dropZone.style.borderColor = "green";
  };

  dropZone.ondragleave = () => {
    dropZone.style.borderColor = "#ccc";
  };

  dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.style.borderColor = "#ccc";
    handleFile(e.dataTransfer.files[0]);
  };

  async function handleFile(file) {
    if (!file) return;

    preview.style.display = "block";
    preview.src = "";

    try {
      const url = await uploadToGitHub(file);
      preview.src = url;
      preview.dataset.url = url;
      alert("Upload erfolgreich!");
    } catch (err) {
      alert("Fehler beim Upload");
    }
  }
}

document.addEventListener("DOMContentLoaded", setupDragDrop);
</script>

</body>
</html>
